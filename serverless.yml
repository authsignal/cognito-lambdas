service: cognito-example

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  environment:
    AUTHSIGNAL_SECRET: ${env:AUTHSIGNAL_SECRET}
    AUTHSIGNAL_URL: ${env:AUTHSIGNAL_URL}
  httpApi:
    authorizers:
      jwtAuthorizer:
        type: jwt
        identitySource: $request.header.authorization
        issuerUrl: https://cognito-idp.us-west-2.amazonaws.com/us-west-2_bZdsrziQ9
        audience:
          - 35kkrdcretk19d7u48q45uhqh9

package:
  individually: true

functions:
  defineAuthChallenge:
    handler: define-auth-challenge.handler

  createAuthChallenge:
    handler: create-auth-challenge.handler

  verifyAuthChallengeResponse:
    handler: verify-auth-challenge-response.handler

  preSignUp:
    handler: pre-sign-up.handler

  getAuthenticators:
    handler: get-authenticators.handler
    events:
      - httpApi:
          method: get
          path: /authenticators
          authorizer:
            name: jwtAuthorizer

  addAuthenticator:
    handler: add-authenticator.handler
    events:
      - httpApi:
          method: post
          path: /authenticators
          authorizer:
            name: jwtAuthorizer

  removeAuthenticator:
    handler: remove-authenticator.handler
    events:
      - httpApi:
          method: delete
          path: /authenticators/{authenticator_id}
          authorizer:
            name: jwtAuthorizer
